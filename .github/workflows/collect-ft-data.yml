name: Collect FT Data (Daily)

on:
  schedule:
    # 8:53 AM EST weekdays (13:53 UTC)
    - cron: '53 13 * * 1,2,3,4,5'
  workflow_dispatch:

permissions:
  contents: write

env:
  OWNER: krogertechnology
  REPO: esperanto

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect FT run data
        env:
          GH_TOKEN: ${{ secrets.ESPERANTO_PAT }}
        run: |
          set -e
          TODAY=$(date +%Y-%m-%d)
          echo "Collecting FT data for $TODAY"

          # 1. Fetch recent main-branch FT runs (03-Util, every 2h)
          echo "Fetching main-branch failure runs..."
          MAIN_RUNS=$(gh run list \
            --repo $OWNER/$REPO \
            --workflow="03-Util-log-ft-failures-against-main.yml" \
            --limit 12 \
            --json databaseId,conclusion,createdAt,status,displayTitle 2>/dev/null || echo "[]")

          # 2. Fetch recent lafingcow dispatch runs
          echo "Fetching lafingcow dispatch runs..."
          ALL_DISPATCH_RUNS=$(gh run list \
            --repo $OWNER/$REPO \
            --workflow="01-PRCI-dispatchFunctionalTests.yml" \
            --limit 50 \
            --json databaseId,conclusion,createdAt,status,displayTitle,headBranch,htmlUrl 2>/dev/null || echo "[]")

          LAFINGCOW_RUNS=$(echo "$ALL_DISPATCH_RUNS" | jq '[.[] | select(.displayTitle | test("lafingcow"; "i"))] | .[0:10]')

          # 3. Count PRCI failures across branches (last 24h)
          echo "Checking for cross-PR spikes..."
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-24H +%Y-%m-%dT%H:%M:%SZ)
          FAILED_RUNS=$(echo "$ALL_DISPATCH_RUNS" | jq --arg cutoff "$CUTOFF" \
            '[.[] | select(.conclusion == "failure" and .createdAt > $cutoff)]')
          SPIKE_BRANCHES=$(echo "$FAILED_RUNS" | jq '[.[].headBranch] | unique | length')

          # 4. Build summary JSON
          MAIN_PASS=$(echo "$MAIN_RUNS" | jq '[.[] | select(.conclusion == "success")] | length')
          MAIN_FAIL=$(echo "$MAIN_RUNS" | jq '[.[] | select(.conclusion == "failure")] | length')
          MAIN_LATEST=$(echo "$MAIN_RUNS" | jq -r '.[0].conclusion // "unknown"')
          MAIN_LATEST_TIME=$(echo "$MAIN_RUNS" | jq -r '.[0].createdAt // "unknown"')

          LAFINGCOW_LATEST=$(echo "$LAFINGCOW_RUNS" | jq -r '.[0].conclusion // "none"')
          LAFINGCOW_LATEST_TIME=$(echo "$LAFINGCOW_RUNS" | jq -r '.[0].createdAt // "none"')

          cat > "data/daily-${TODAY}.json" <<ENDJSON
          {
            "date": "$TODAY",
            "collectedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mainBranch": {
              "latestConclusion": "$MAIN_LATEST",
              "latestTime": "$MAIN_LATEST_TIME",
              "passCount": $MAIN_PASS,
              "failCount": $MAIN_FAIL,
              "runs": $(echo "$MAIN_RUNS" | jq '.[0:10]')
            },
            "lafingcowDispatches": {
              "latestConclusion": "$LAFINGCOW_LATEST",
              "latestTime": "$LAFINGCOW_LATEST_TIME",
              "runs": $LAFINGCOW_RUNS
            },
            "crossPrSpikes": {
              "failedRunsLast24h": $(echo "$FAILED_RUNS" | jq 'length'),
              "uniqueBranchesWithFailures": $SPIKE_BRANCHES,
              "spikeDetected": $([ "$SPIKE_BRANCHES" -ge 3 ] && echo "true" || echo "false")
            }
          }
          ENDJSON

          echo "Data written to data/daily-${TODAY}.json"

          # Also write latest.json as a symlink-like pointer
          cp "data/daily-${TODAY}.json" data/latest.json

      - name: Snapshot allowlist and quarantine per-test status
        env:
          GH_TOKEN: ${{ secrets.ESPERANTO_PAT }}
        run: |
          set -e
          TODAY=$(date +%Y-%m-%d)
          OWNER=krogertechnology
          ALLOW_LIST=266
          QUARANTINE_LIST=277
          TEAM=lafingcow

          # GraphQL query to fetch all project items with field values
          QUERY='query($org: String!, $number: Int!, $cursor: String) {
            organization(login: $org) {
              projectV2(number: $number) {
                items(first: 100, after: $cursor) {
                  pageInfo { hasNextPage endCursor }
                  nodes {
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldTextValue {
                          text
                          field { ... on ProjectV2FieldCommon { name } }
                        }
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field { ... on ProjectV2FieldCommon { name } }
                        }
                        ... on ProjectV2ItemFieldDateValue {
                          date
                          field { ... on ProjectV2FieldCommon { name } }
                        }
                        ... on ProjectV2ItemFieldNumberValue {
                          number
                          field { ... on ProjectV2FieldCommon { name } }
                        }
                      }
                    }
                  }
                }
              }
            }
          }'

          fetch_project_items() {
            local project_num=$1
            local cursor=""
            local all_items="[]"
            local has_next="true"

            while [ "$has_next" = "true" ]; do
              if [ -z "$cursor" ]; then
                result=$(gh api graphql -f query="$QUERY" -f org="$OWNER" -F number="$project_num" 2>/dev/null || echo '{"data":{"organization":{"projectV2":{"items":{"pageInfo":{"hasNextPage":false},"nodes":[]}}}}}')
              else
                result=$(gh api graphql -f query="$QUERY" -f org="$OWNER" -F number="$project_num" -f cursor="$cursor" 2>/dev/null || echo '{"data":{"organization":{"projectV2":{"items":{"pageInfo":{"hasNextPage":false},"nodes":[]}}}}}')
              fi

              nodes=$(echo "$result" | jq '.data.organization.projectV2.items.nodes')
              all_items=$(echo "$all_items $nodes" | jq -s 'add')
              has_next=$(echo "$result" | jq -r '.data.organization.projectV2.items.pageInfo.hasNextPage')
              cursor=$(echo "$result" | jq -r '.data.organization.projectV2.items.pageInfo.endCursor')
            done

            echo "$all_items"
          }

          echo "Fetching allow list (Project #$ALLOW_LIST)..."
          ALLOW_ITEMS=$(fetch_project_items $ALLOW_LIST)

          echo "Fetching quarantine list (Project #$QUARANTINE_LIST)..."
          QUARANTINE_ITEMS=$(fetch_project_items $QUARANTINE_LIST)

          # Parse items into flat objects: extract Title, Team Name, Date Added, Strikes
          parse_items() {
            echo "$1" | jq '[
              .[] |
              {
                title: (
                  [.fieldValues.nodes[] | select(.field.name == "Title") | .text] | first // null
                ),
                teamName: (
                  [.fieldValues.nodes[] | select(.field.name == "Team Name") | (.text // .name)] | first // null
                ),
                addedDate: (
                  [.fieldValues.nodes[] | select(.field.name == "Date Added") | .date] | first // null
                ),
                strikes: (
                  [.fieldValues.nodes[] | select(.field.name == "Strikes") | .number] | first // null
                )
              } |
              select(.title != null)
            ]'
          }

          ALLOW_PARSED=$(parse_items "$ALLOW_ITEMS")
          QUARANTINE_PARSED=$(parse_items "$QUARANTINE_ITEMS")

          # Filter to lafingcow team only
          ALLOW_OWNED=$(echo "$ALLOW_PARSED" | jq --arg team "$TEAM" '[.[] | select((.teamName // "" | ascii_downcase) == $team)]')
          QUARANTINE_OWNED=$(echo "$QUARANTINE_PARSED" | jq --arg team "$TEAM" '[.[] | select((.teamName // "" | ascii_downcase) == $team)]')

          echo "Allow list owned: $(echo "$ALLOW_OWNED" | jq 'length')"
          echo "Quarantine owned: $(echo "$QUARANTINE_OWNED" | jq 'length')"

          # Write today's snapshot
          jq -n \
            --arg date "$TODAY" \
            --argjson allowList "$ALLOW_OWNED" \
            --argjson quarantine "$QUARANTINE_OWNED" \
            '{ date: $date, allowList: $allowList, quarantine: $quarantine }' \
            > "data/test-snapshot-${TODAY}.json"

          echo "Snapshot written to data/test-snapshot-${TODAY}.json"

          # Find previous snapshot to diff against
          PREV_SNAPSHOT=$(ls data/test-snapshot-*.json 2>/dev/null | sort | tail -2 | head -1)

          if [ -z "$PREV_SNAPSHOT" ] || [ "$PREV_SNAPSHOT" = "data/test-snapshot-${TODAY}.json" ]; then
            echo "No previous snapshot found — initialising test-history.json with current state"
            jq -n \
              --arg date "$TODAY" \
              '{ lastUpdated: $date, transitions: [] }' \
              > data/test-history.json
          else
            echo "Diffing against $PREV_SNAPSHOT"

            PREV_ALLOW=$(jq '[.[].title | ascii_downcase]' <(jq '.allowList' "$PREV_SNAPSHOT"))
            PREV_QUARANTINE=$(jq '[.[].title | ascii_downcase]' <(jq '.quarantine' "$PREV_SNAPSHOT"))
            CUR_ALLOW=$(echo "$ALLOW_OWNED" | jq '[.[].title | ascii_downcase]')
            CUR_QUARANTINE=$(echo "$QUARANTINE_OWNED" | jq '[.[].title | ascii_downcase]')

            # Tests newly added to quarantine (were on allow list, now on quarantine)
            NEWLY_QUARANTINED=$(jq -n \
              --argjson prev_allow "$PREV_ALLOW" \
              --argjson cur_quarantine "$CUR_QUARANTINE" \
              '[$cur_quarantine[] | select(. as $t | $prev_allow | index($t) != null)]')

            # Tests restored to allowlist (were on quarantine, now on allow list)
            NEWLY_RESTORED=$(jq -n \
              --argjson prev_quarantine "$PREV_QUARANTINE" \
              --argjson cur_allow "$CUR_ALLOW" \
              '[$cur_allow[] | select(. as $t | $prev_quarantine | index($t) != null)]')

            # Tests newly added to quarantine without being on allow list before
            NEWLY_ADDED_TO_QUARANTINE=$(jq -n \
              --argjson prev_quarantine "$PREV_QUARANTINE" \
              --argjson cur_quarantine "$CUR_QUARANTINE" \
              '[$cur_quarantine[] | select(. as $t | $prev_quarantine | index($t) == null)]')

            # Detect the latest failed main-branch run URL for linking
            TODAY_DAILY="data/daily-${TODAY}.json"
            LATEST_FAIL_URL=""
            if [ -f "$TODAY_DAILY" ]; then
              LATEST_FAIL_URL=$(jq -r \
                '.mainBranch.runs[] | select(.conclusion == "failure") | "https://github.com/krogertechnology/esperanto/actions/runs/\(.databaseId)"' \
                "$TODAY_DAILY" 2>/dev/null | head -1 || true)
            fi

            # Fetch owned-test failure annotations from the failed run (once, reused for all transitions)
            OWNED_FAILURE_DETAILS="[]"
            if [ -n "$LATEST_FAIL_URL" ]; then
              RUN_ID=$(echo "$LATEST_FAIL_URL" | grep -oE '[0-9]+$')
              if [ -n "$RUN_ID" ]; then
                echo "Fetching failure annotations for run $RUN_ID..."
                JOBS_JSON=$(curl -sf \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/krogertechnology/esperanto/actions/runs/$RUN_ID/jobs?per_page=100" \
                  || echo '{"jobs":[]}')
                OWNED_FRAGS='["kroger-store-details","kroger-store-tests","modality-selector-ui"]'
                while IFS= read -r JOB_ID; do
                  [ -z "$JOB_ID" ] && continue
                  ANNS=$(curl -sf \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/krogertechnology/esperanto/check-runs/$JOB_ID/annotations?per_page=50" \
                    || echo '[]')
                  MATCHED=$(echo "$ANNS" | jq --argjson frags "$OWNED_FRAGS" '[
                    .[] | select(.annotation_level == "failure") |
                    select(.path as $p | $frags[] | . as $f | $p | ascii_downcase | contains($f)) |
                    {testFile: (.path | split("/") | last), message: (.message | if length > 400 then .[:400] + "…" else . end)}
                  ]')
                  if [ "$(echo "$MATCHED" | jq 'length')" -gt 0 ]; then
                    OWNED_FAILURE_DETAILS=$(echo "[$OWNED_FAILURE_DETAILS, $MATCHED]" | jq 'flatten')
                  fi
                done < <(echo "$JOBS_JSON" | jq -r '.jobs[] | select(.conclusion == "failure") | .id')
                echo "Owned failure annotations found: $(echo "$OWNED_FAILURE_DETAILS" | jq 'length')"
              fi
            fi

            # Build new transition entries
            NEW_TRANSITIONS="[]"

            # Add newly quarantined (from allowlist)
            while IFS= read -r title; do
              [ -z "$title" ] && continue
              STRIKES=$(echo "$QUARANTINE_OWNED" | jq -r --arg t "$title" \
                '.[] | select((.title | ascii_downcase) == $t) | .strikes // "unknown"')
              ENTRY=$(jq -n \
                --arg date "$TODAY" \
                --arg test "$title" \
                --arg strikes "$STRIKES" \
                --arg runUrl "${LATEST_FAIL_URL}" \
                --argjson failureDetails "$OWNED_FAILURE_DETAILS" \
                '{ date: $date, test: $test, from: "allowList", to: "quarantine", strikes: $strikes,
                   runUrl: (if $runUrl == "" then null else $runUrl end),
                   failureDetails: (if ($failureDetails | length) > 0 then $failureDetails else null end) }')
              NEW_TRANSITIONS=$(echo "$NEW_TRANSITIONS" | jq --argjson e "$ENTRY" '. + [$e]')
            done < <(echo "$NEWLY_QUARANTINED" | jq -r '.[]')

            # Add newly added to quarantine (not previously on allowlist either)
            while IFS= read -r title; do
              [ -z "$title" ] && continue
              # Skip if already covered by NEWLY_QUARANTINED
              if echo "$NEWLY_QUARANTINED" | jq -e --arg t "$title" '. | index($t) != null' > /dev/null 2>&1; then
                continue
              fi
              STRIKES=$(echo "$QUARANTINE_OWNED" | jq -r --arg t "$title" \
                '.[] | select((.title | ascii_downcase) == $t) | .strikes // "unknown"')
              ENTRY=$(jq -n \
                --arg date "$TODAY" \
                --arg test "$title" \
                --arg strikes "$STRIKES" \
                --arg runUrl "${LATEST_FAIL_URL}" \
                --argjson failureDetails "$OWNED_FAILURE_DETAILS" \
                '{ date: $date, test: $test, from: "unknown", to: "quarantine", strikes: $strikes,
                   runUrl: (if $runUrl == "" then null else $runUrl end),
                   failureDetails: (if ($failureDetails | length) > 0 then $failureDetails else null end) }')
              NEW_TRANSITIONS=$(echo "$NEW_TRANSITIONS" | jq --argjson e "$ENTRY" '. + [$e]')
            done < <(echo "$NEWLY_ADDED_TO_QUARANTINE" | jq -r '.[]')

            # Add newly restored
            while IFS= read -r title; do
              [ -z "$title" ] && continue
              ENTRY=$(jq -n \
                --arg date "$TODAY" \
                --arg test "$title" \
                '{ date: $date, test: $test, from: "quarantine", to: "allowList", strikes: null, runUrl: null }')
              NEW_TRANSITIONS=$(echo "$NEW_TRANSITIONS" | jq --argjson e "$ENTRY" '. + [$e]')
            done < <(echo "$NEWLY_RESTORED" | jq -r '.[]')

            echo "New transitions detected: $(echo "$NEW_TRANSITIONS" | jq 'length')"

            # Merge into existing test-history.json (or create fresh)
            if [ -f "data/test-history.json" ]; then
              EXISTING=$(jq '.transitions' data/test-history.json)
              MERGED=$(jq -n --argjson e "$EXISTING" --argjson n "$NEW_TRANSITIONS" '$e + $n')
            else
              MERGED="$NEW_TRANSITIONS"
            fi

            jq -n \
              --arg date "$TODAY" \
              --argjson transitions "$MERGED" \
              '{ lastUpdated: $date, transitions: $transitions }' \
              > data/test-history.json

            echo "test-history.json updated"
          fi

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: collect FT data for $(date +%Y-%m-%d)"
          git push

      - name: Check for alerts
        id: alerts
        env:
          GH_TOKEN: ${{ secrets.ESPERANTO_PAT }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          DATA="data/daily-${TODAY}.json"

          SPIKE=$(jq -r '.crossPrSpikes.spikeDetected' "$DATA")
          MAIN_STATUS=$(jq -r '.mainBranch.latestConclusion' "$DATA")
          MAIN_PASS=$(jq -r '.mainBranch.passCount' "$DATA")
          MAIN_FAIL=$(jq -r '.mainBranch.failCount' "$DATA")
          SPIKE_BRANCHES=$(jq -r '.crossPrSpikes.uniqueBranchesWithFailures' "$DATA")
          FAILED_24H=$(jq -r '.crossPrSpikes.failedRunsLast24h' "$DATA")
          LAFINGCOW_STATUS=$(jq -r '.lafingcowDispatches.latestConclusion' "$DATA")
          LAFINGCOW_TIME=$(jq -r '.lafingcowDispatches.latestTime' "$DATA")

          # Determine if we need to send an alert
          SEND_ALERT=false
          ALERT_COLOR="00FF00"
          ALERT_TITLE="LAFing Cow FT Daily Report"

          if [ "$SPIKE" = "true" ]; then
            SEND_ALERT=true
            ALERT_COLOR="FF0000"
            ALERT_TITLE="LAFing Cow FT Alert — Cross-PR Spike Detected"
            echo "::warning::Cross-PR spike detected! Failures across $SPIKE_BRANCHES branches in the last 24h."
          fi

          if [ "$MAIN_STATUS" = "failure" ]; then
            SEND_ALERT=true
            ALERT_COLOR="FF6600"
            ALERT_TITLE="LAFing Cow FT Alert — Main Branch Failure"
            echo "::warning::Latest main-branch FT run FAILED"
          fi

          # Always send daily summary (change to only-on-failure by setting SEND_ALERT logic above)
          SEND_ALERT=true

          echo "send_alert=$SEND_ALERT" >> $GITHUB_OUTPUT
          echo "alert_color=$ALERT_COLOR" >> $GITHUB_OUTPUT
          echo "alert_title=$ALERT_TITLE" >> $GITHUB_OUTPUT
          echo "main_status=$MAIN_STATUS" >> $GITHUB_OUTPUT
          echo "main_pass=$MAIN_PASS" >> $GITHUB_OUTPUT
          echo "main_fail=$MAIN_FAIL" >> $GITHUB_OUTPUT
          echo "spike=$SPIKE" >> $GITHUB_OUTPUT
          echo "spike_branches=$SPIKE_BRANCHES" >> $GITHUB_OUTPUT
          echo "failed_24h=$FAILED_24H" >> $GITHUB_OUTPUT
          echo "lafingcow_status=$LAFINGCOW_STATUS" >> $GITHUB_OUTPUT
          echo "lafingcow_time=$LAFINGCOW_TIME" >> $GITHUB_OUTPUT
          echo "Collection complete. Main: $MAIN_STATUS, Spike: $SPIKE"

      - name: Send email notification
        if: steps.alerts.outputs.send_alert == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: mailout.ha.kroger.com
          server_port: 25
          ignore_cert: true
          subject: "${{ steps.alerts.outputs.alert_title }} — ${{ steps.alerts.outputs.main_status }}"
          to: bryce.palmer@kroger.com
          from: ft-dashboard@kroger.com
          html_body: |
            <html>
            <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
              <h2 style="color: ${{ steps.alerts.outputs.main_status == 'failure' && '#cc0000' || '#333' }};">
                ${{ steps.alerts.outputs.alert_title }}
              </h2>

              <table style="border-collapse: collapse; width: 100%; margin: 16px 0;">
                <tr style="border-bottom: 1px solid #eee;">
                  <td style="padding: 8px; color: #666;">Main Branch (last 12 runs)</td>
                  <td style="padding: 8px; font-weight: bold;">
                    ${{ steps.alerts.outputs.main_status == 'success' && '&#9989;' || '&#10060;' }}
                    ${{ steps.alerts.outputs.main_pass }} passed / ${{ steps.alerts.outputs.main_fail }} failed
                  </td>
                </tr>
                <tr style="border-bottom: 1px solid #eee;">
                  <td style="padding: 8px; color: #666;">LAFing Cow Dispatch</td>
                  <td style="padding: 8px;">${{ steps.alerts.outputs.lafingcow_status }} (${{ steps.alerts.outputs.lafingcow_time }})</td>
                </tr>
                <tr style="border-bottom: 1px solid #eee;">
                  <td style="padding: 8px; color: #666;">Cross-PR Spikes</td>
                  <td style="padding: 8px; ${{ steps.alerts.outputs.spike == 'true' && 'color: #cc0000; font-weight: bold;' || '' }}">
                    ${{ steps.alerts.outputs.spike == 'true'
                      && format('&#9888; SPIKE — Failures across {0} branches ({1} failed runs in 24h)', steps.alerts.outputs.spike_branches, steps.alerts.outputs.failed_24h)
                      || '&#9989; No cross-PR spikes' }}
                  </td>
                </tr>
              </table>

              <p>
                <a href="https://github.com/krogertechnology/esperanto/actions/workflows/01-PRCI-dispatchFunctionalTests.yml" style="color: #0066cc;">View Esperanto FT Runs</a>
                &nbsp;|&nbsp;
                <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="color: #0066cc;">View Collection Run</a>
              </p>
            </body>
            </html>
