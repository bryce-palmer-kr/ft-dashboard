name: Collect FT Data (Daily)

on:
  schedule:
    # 8:53 AM EST weekdays (13:53 UTC)
    - cron: '53 13 * * 1,2,3,4,5'
  workflow_dispatch:

permissions:
  contents: write

env:
  OWNER: krogertechnology
  REPO: esperanto

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect FT run data
        env:
          GH_TOKEN: ${{ secrets.ESPERANTO_PAT }}
        run: |
          set -e
          TODAY=$(date +%Y-%m-%d)
          echo "Collecting FT data for $TODAY"

          # 1. Fetch recent main-branch FT runs (03-Util, every 2h)
          echo "Fetching main-branch failure runs..."
          MAIN_RUNS=$(gh run list \
            --repo $OWNER/$REPO \
            --workflow="03-Util-log-ft-failures-against-main.yml" \
            --limit 12 \
            --json databaseId,conclusion,createdAt,status,displayTitle 2>/dev/null || echo "[]")

          # 2. Fetch recent lafingcow dispatch runs
          echo "Fetching lafingcow dispatch runs..."
          ALL_DISPATCH_RUNS=$(gh run list \
            --repo $OWNER/$REPO \
            --workflow="01-PRCI-dispatchFunctionalTests.yml" \
            --limit 50 \
            --json databaseId,conclusion,createdAt,status,displayTitle,headBranch,htmlUrl 2>/dev/null || echo "[]")

          LAFINGCOW_RUNS=$(echo "$ALL_DISPATCH_RUNS" | jq '[.[] | select(.displayTitle | test("lafingcow"; "i"))] | .[0:10]')

          # 3. Count PRCI failures across branches (last 24h)
          echo "Checking for cross-PR spikes..."
          CUTOFF=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-24H +%Y-%m-%dT%H:%M:%SZ)
          FAILED_RUNS=$(echo "$ALL_DISPATCH_RUNS" | jq --arg cutoff "$CUTOFF" \
            '[.[] | select(.conclusion == "failure" and .createdAt > $cutoff)]')
          SPIKE_BRANCHES=$(echo "$FAILED_RUNS" | jq '[.[].headBranch] | unique | length')

          # 4. Build summary JSON
          MAIN_PASS=$(echo "$MAIN_RUNS" | jq '[.[] | select(.conclusion == "success")] | length')
          MAIN_FAIL=$(echo "$MAIN_RUNS" | jq '[.[] | select(.conclusion == "failure")] | length')
          MAIN_LATEST=$(echo "$MAIN_RUNS" | jq -r '.[0].conclusion // "unknown"')
          MAIN_LATEST_TIME=$(echo "$MAIN_RUNS" | jq -r '.[0].createdAt // "unknown"')

          LAFINGCOW_LATEST=$(echo "$LAFINGCOW_RUNS" | jq -r '.[0].conclusion // "none"')
          LAFINGCOW_LATEST_TIME=$(echo "$LAFINGCOW_RUNS" | jq -r '.[0].createdAt // "none"')

          cat > "data/daily-${TODAY}.json" <<ENDJSON
          {
            "date": "$TODAY",
            "collectedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mainBranch": {
              "latestConclusion": "$MAIN_LATEST",
              "latestTime": "$MAIN_LATEST_TIME",
              "passCount": $MAIN_PASS,
              "failCount": $MAIN_FAIL,
              "runs": $(echo "$MAIN_RUNS" | jq '.[0:10]')
            },
            "lafingcowDispatches": {
              "latestConclusion": "$LAFINGCOW_LATEST",
              "latestTime": "$LAFINGCOW_LATEST_TIME",
              "runs": $LAFINGCOW_RUNS
            },
            "crossPrSpikes": {
              "failedRunsLast24h": $(echo "$FAILED_RUNS" | jq 'length'),
              "uniqueBranchesWithFailures": $SPIKE_BRANCHES,
              "spikeDetected": $([ "$SPIKE_BRANCHES" -ge 3 ] && echo "true" || echo "false")
            }
          }
          ENDJSON

          echo "Data written to data/daily-${TODAY}.json"

          # Also write latest.json as a symlink-like pointer
          cp "data/daily-${TODAY}.json" data/latest.json

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: collect FT data for $(date +%Y-%m-%d)"
          git push

      - name: Check for alerts
        id: alerts
        env:
          GH_TOKEN: ${{ secrets.ESPERANTO_PAT }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          DATA="data/daily-${TODAY}.json"

          SPIKE=$(jq -r '.crossPrSpikes.spikeDetected' "$DATA")
          MAIN_STATUS=$(jq -r '.mainBranch.latestConclusion' "$DATA")
          MAIN_PASS=$(jq -r '.mainBranch.passCount' "$DATA")
          MAIN_FAIL=$(jq -r '.mainBranch.failCount' "$DATA")
          SPIKE_BRANCHES=$(jq -r '.crossPrSpikes.uniqueBranchesWithFailures' "$DATA")
          FAILED_24H=$(jq -r '.crossPrSpikes.failedRunsLast24h' "$DATA")
          LAFINGCOW_STATUS=$(jq -r '.lafingcowDispatches.latestConclusion' "$DATA")
          LAFINGCOW_TIME=$(jq -r '.lafingcowDispatches.latestTime' "$DATA")

          # Determine if we need to send an alert
          SEND_ALERT=false
          ALERT_COLOR="00FF00"
          ALERT_TITLE="LAFing Cow FT Daily Report"

          if [ "$SPIKE" = "true" ]; then
            SEND_ALERT=true
            ALERT_COLOR="FF0000"
            ALERT_TITLE="LAFing Cow FT Alert — Cross-PR Spike Detected"
            echo "::warning::Cross-PR spike detected! Failures across $SPIKE_BRANCHES branches in the last 24h."
          fi

          if [ "$MAIN_STATUS" = "failure" ]; then
            SEND_ALERT=true
            ALERT_COLOR="FF6600"
            ALERT_TITLE="LAFing Cow FT Alert — Main Branch Failure"
            echo "::warning::Latest main-branch FT run FAILED"
          fi

          # Always send daily summary (change to only-on-failure by setting SEND_ALERT logic above)
          SEND_ALERT=true

          echo "send_alert=$SEND_ALERT" >> $GITHUB_OUTPUT
          echo "alert_color=$ALERT_COLOR" >> $GITHUB_OUTPUT
          echo "alert_title=$ALERT_TITLE" >> $GITHUB_OUTPUT
          echo "main_status=$MAIN_STATUS" >> $GITHUB_OUTPUT
          echo "main_pass=$MAIN_PASS" >> $GITHUB_OUTPUT
          echo "main_fail=$MAIN_FAIL" >> $GITHUB_OUTPUT
          echo "spike=$SPIKE" >> $GITHUB_OUTPUT
          echo "spike_branches=$SPIKE_BRANCHES" >> $GITHUB_OUTPUT
          echo "failed_24h=$FAILED_24H" >> $GITHUB_OUTPUT
          echo "lafingcow_status=$LAFINGCOW_STATUS" >> $GITHUB_OUTPUT
          echo "lafingcow_time=$LAFINGCOW_TIME" >> $GITHUB_OUTPUT
          echo "Collection complete. Main: $MAIN_STATUS, Spike: $SPIKE"

      - name: Send Teams notification
        if: steps.alerts.outputs.send_alert == 'true' && secrets.TEAMS_WEBHOOK_URL != ''
        run: |
          TODAY=$(date +%Y-%m-%d)
          MAIN_STATUS="${{ steps.alerts.outputs.main_status }}"
          MAIN_PASS="${{ steps.alerts.outputs.main_pass }}"
          MAIN_FAIL="${{ steps.alerts.outputs.main_fail }}"
          SPIKE="${{ steps.alerts.outputs.spike }}"
          SPIKE_BRANCHES="${{ steps.alerts.outputs.spike_branches }}"
          FAILED_24H="${{ steps.alerts.outputs.failed_24h }}"
          LAFINGCOW_STATUS="${{ steps.alerts.outputs.lafingcow_status }}"
          LAFINGCOW_TIME="${{ steps.alerts.outputs.lafingcow_time }}"
          COLOR="${{ steps.alerts.outputs.alert_color }}"
          TITLE="${{ steps.alerts.outputs.alert_title }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ESPERANTO_ACTIONS="https://github.com/krogertechnology/esperanto/actions/workflows/01-PRCI-dispatchFunctionalTests.yml"

          # Main status emoji
          if [ "$MAIN_STATUS" = "success" ]; then
            MAIN_EMOJI="✅"
          elif [ "$MAIN_STATUS" = "failure" ]; then
            MAIN_EMOJI="❌"
          else
            MAIN_EMOJI="⚪"
          fi

          # Spike emoji
          if [ "$SPIKE" = "true" ]; then
            SPIKE_TEXT="⚠️ **SPIKE** — Failures across $SPIKE_BRANCHES branches ($FAILED_24H failed runs in 24h)"
          else
            SPIKE_TEXT="✅ No cross-PR spikes"
          fi

          # Build Adaptive Card JSON
          cat > /tmp/teams-card.json <<CARD
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": "$TITLE",
                      "weight": "bolder",
                      "size": "medium",
                      "color": "$([ "$COLOR" = "00FF00" ] && echo "good" || echo "attention")"
                    },
                    {
                      "type": "TextBlock",
                      "text": "$TODAY",
                      "isSubtle": true,
                      "spacing": "none"
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Main Branch (last 12 runs)", "value": "$MAIN_EMOJI $MAIN_PASS passed / $MAIN_FAIL failed" },
                        { "title": "LAFing Cow Dispatch", "value": "$LAFINGCOW_STATUS ($LAFINGCOW_TIME)" },
                        { "title": "Cross-PR Spikes", "value": "$SPIKE_TEXT" }
                      ]
                    }
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "View Esperanto FT Runs",
                      "url": "$ESPERANTO_ACTIONS"
                    },
                    {
                      "type": "Action.OpenUrl",
                      "title": "View Collection Run",
                      "url": "$RUN_URL"
                    }
                  ]
                }
              }
            ]
          }
          CARD

          # Post to Teams
          HTTP_STATUS=$(curl -s -o /tmp/teams-response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @/tmp/teams-card.json \
            "${{ secrets.TEAMS_WEBHOOK_URL }}")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Teams notification sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Teams notification failed (HTTP $HTTP_STATUS)"
            cat /tmp/teams-response.txt
          fi
